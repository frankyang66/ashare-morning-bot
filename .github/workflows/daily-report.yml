name: Daily AShare Report

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:

jobs:
  run-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run report
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_BOT_SECRET: ${{ secrets.FEISHU_BOT_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          LOOKBACK_HOURS: ${{ secrets.LOOKBACK_HOURS }}
          MAX_NEWS_ITEMS: ${{ secrets.MAX_NEWS_ITEMS }}
          RSS_FETCH_TIMEOUT: ${{ secrets.RSS_FETCH_TIMEOUT }}
          RSS_FETCH_WORKERS: ${{ secrets.RSS_FETCH_WORKERS }}
          TITLE_SIMILARITY_THRESHOLD: ${{ secrets.TITLE_SIMILARITY_THRESHOLD }}
        run: python main.py
